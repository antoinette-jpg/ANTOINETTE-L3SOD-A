<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management | Gikundiro Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: var(--body-bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-soft);
        }
        
        .admin-title {
            color: var(--text);
            font-size: 2.6rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        
        .admin-subtitle {
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.9;
        }
        
        .admin-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .btn-add-product {
            background: var(--gold);
            color: #070707;
            border: none;
            padding: 1rem 1.8rem;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
        }
        
        .btn-add-product:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(214,178,60,0.3);
        }
        
        .products-grid {
            display: grid;
            gap: 2rem;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        }
        
        .product-card {
            background: var(--surface);
            border: 1px solid var(--border-soft);
            border-radius: 24px;
            padding: 1.8rem;
            box-shadow: var(--shadow);
            transition: transform var(--transition), border-color var(--transition);
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            border-color: rgba(214,178,60,0.35);
        }
        
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        
        .product-info h3 {
            color: var(--text);
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }
        
        .product-category {
            display: inline-block;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.35rem;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }
        
        .product-price {
            color: var(--gold);
            font-size: 1.2rem;
            font-weight: 800;
        }
        
        .product-description {
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }
        
        .product-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: space-between;
        }
        
        .btn-edit, .btn-delete {
            padding: 0.65rem 1.2rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.9rem;
            flex: 1;
        }
        
        .btn-edit {
            background: rgba(214,178,60,0.2);
            color: var(--gold);
        }
        
        .btn-edit:hover {
            background: var(--gold);
            color: #070707;
            transform: scale(1.05);
        }
        
        .btn-delete {
            background: rgba(239,68,68,0.2);
            color: #ef4444;
        }
        
        .btn-delete:hover {
            background: #ef4444;
            color: white;
            transform: scale(1.05);
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            z-index: 100;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-card {
            width: 100%;
            max-width: 600px;
            background: var(--surface);
            border: 1px solid var(--border-soft);
            border-radius: 28px;
            padding: 2rem;
            box-shadow: var(--shadow);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .modal-title {
            color: var(--text);
            font-size: 1.8rem;
            font-weight: 800;
        }
        
        .close-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color var(--transition);
            padding: 0.5rem;
        }
        
        .close-btn:hover {
            color: var(--text);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            color: var(--text);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: var(--surface-soft);
            border: 1px solid var(--border-soft);
            border-radius: 14px;
            padding: 1rem;
            color: var(--text);
            font-family: inherit;
            transition: border-color var(--transition);
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }
        
        .btn-cancel {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border-soft);
            padding: 1rem 1.8rem;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.08rem;
        }
        
        .btn-cancel:hover {
            background: var(--surface-soft);
            transform: translateY(-2px);
        }
        
        .btn-save {
            background: var(--gold);
            color: #070707;
            border: none;
            padding: 1rem 1.8rem;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.08rem;
        }
        
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(214,178,60,0.3);
        }
        
        .search-filter {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .search-input {
            flex: 1;
            min-width: 200px;
            background: var(--surface-soft);
            border: 1px solid var(--border-soft);
            border-radius: 14px;
            padding: 1rem;
            color: var(--text);
            transition: border-color var(--transition);
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--gold);
        }
        
        .filter-select {
            background: var(--surface-soft);
            border: 1px solid var(--border-soft);
            border-radius: 14px;
            padding: 1rem;
            color: var(--text);
            transition: border-color var(--transition);
        }
        
        .filter-select:focus {
            outline: none;
            border-color: var(--gold);
        }
        
        .back-to-home {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            background: var(--surface);
            border: 1px solid var(--border-soft);
            padding: 1rem;
            border-radius: 50%;
            color: var(--text);
            text-decoration: none;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-to-home:hover {
            transform: translateY(-2px);
            border-color: rgba(214,178,60,0.35);
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
        }
        
        .empty-state i {
            font-size: 4rem;
            color: var(--border-soft);
            margin-bottom: 1rem;
        }
        
        .empty-state h3 {
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        
        .section-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .section-header span {
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.4rem;
            font-size: 0.82rem;
        }
        
        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .search-filter {
                flex-direction: column;
            }
            
            .admin-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <div>
                <div class="section-header">
                    <span>Product Management</span>
                    <h1 class="admin-title">Manage Menu Items</h1>
                </div>
                <p class="admin-subtitle">Add, edit, or delete products from your menu</p>
            </div>
            <div class="admin-actions">
                <button class="btn-add-product" onclick="openAddModal()">
                    <i class="fas fa-plus"></i>
                    Add Product
                </button>
            </div>
        </header>

        <div class="search-filter">
            <input type="text" class="search-input" id="searchInput" placeholder="Search products..." onkeyup="filterProducts()">
            <select class="filter-select" id="categoryFilter" onchange="filterProducts()">
                <option value="">All Categories</option>
                <option value="FOODS">Foods</option>
                <option value="DRINKS">Drinks</option>
                <option value="BEVERAGES">Beverages</option>
            </select>
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- Products will be loaded here -->
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <i class="fas fa-utensils"></i>
            <h3>No products found</h3>
            <p>Start by adding your first product</p>
        </div>
    </div>

    <a href="index.html" class="back-to-home" title="Back to Home">
        <i class="fas fa-home"></i>
    </a>

    <!-- Product Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal-card">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Add New Product</h2>
                <button class="close-btn" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <form id="productForm">
                <div class="form-group">
                    <label for="productName">Product Name *</label>
                    <input type="text" id="productName" required>
                </div>
                
                <div class="form-group">
                    <label for="productCategory">Category *</label>
                    <select id="productCategory" required>
                        <option value="">Select Category</option>
                        <option value="FOODS">Foods</option>
                        <option value="DRINKS">Drinks</option>
                        <option value="BEVERAGES">Beverages</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="productPrice">Price (RWF) *</label>
                    <input type="number" id="productPrice" min="0" required>
                </div>
                
                <div class="form-group">
                    <label for="productDescription">Description</label>
                    <textarea id="productDescription" placeholder="Describe your product..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="productImage">Image Path</label>
                    <input type="text" id="productImage" placeholder="./images/product.jpg">
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-save">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Initialize with default menu data if localStorage is empty
        let products = JSON.parse(localStorage.getItem('gikundiroMenu')) || [
            { name: 'Grilled Chicken', desc: 'Tender chicken marinated in herbs and grilled over open flame.', price: 18200, category: 'FOODS', image: './images/JUNGLE GRILL.jfif' },
            { name: 'Beef Brochettes', desc: 'Skewered beef cubes marinated in African spices, grilled to perfection.', price: 13000, category: 'FOODS', image: './images/"The JUICIEST BBQ Kebabs Ever! 🤤🔥 _ Perfect Grill Shots!".jfif' },
            { name: 'Goat Brochettes', desc: 'Tender goat skewers with peppers — a local Rwandan favorite.', price: 14300, category: 'FOODS', image: './images/"The JUICIEST BBQ Kebabs Ever! 🤤🔥 _ Perfect Grill Shots!".jfif' },
            { name: 'Fish Fillet', desc: 'Fresh Nile perch fillet grilled with lemon and herbs.', price: 21500, category: 'FOODS', image: './images/Easy Saucy Ramen Noodles (Vegan Recipe).jfif' },
            { name: 'Ugali & Sukuma Wiki', desc: 'Traditional maize meal with sautéed collard greens.', price: 8500, category: 'FOODS', image: './images/america-vibes.jfif' },
            { name: 'Chicken Wings', desc: 'Crispy fried wings with spicy buffalo sauce.', price: 12500, category: 'FOODS', image: './images/download (20).jfif' },
            { name: 'French Fries', desc: 'Golden crispy fries with sea salt.', price: 6500, category: 'FOODS', image: './images/download (22).jfif' },
            { name: 'Caesar Salad', desc: 'Fresh romaine lettuce with parmesan and croutons.', price: 9500, category: 'FOODS', image: './images/download (23).jfif' },
            { name: 'Gold Cocktail', desc: 'Signature drink with citrus notes and premium spirits.', price: 3200, category: 'DRINKS', image: './images/download (12).jfif' },
            { name: 'Red Wine', desc: 'Fine selection of red wine from renowned vineyards.', price: 3800, category: 'DRINKS', image: './images/download (13).jfif' },
            { name: 'White Wine', desc: 'Chilled white wine with crisp, fruity notes.', price: 4200, category: 'DRINKS', image: './images/download (14).jfif' },
            { name: 'Beer (Local)', desc: 'Premium Rwandan beer, cold and refreshing.', price: 2500, category: 'DRINKS', image: './images/download (24).jfif' },
            { name: 'Imported Beer', desc: 'International beer selection from around the world.', price: 3500, category: 'DRINKS', image: './images/download (25).jfif' },
            { name: 'Mojito', desc: 'Classic Cuban cocktail with mint, lime, and rum.', price: 4500, category: 'DRINKS', image: './images/download (20).jfif' },
            { name: 'Margarita', desc: 'Tequila-based cocktail with lime and triple sec.', price: 4800, category: 'DRINKS', image: './images/download (22).jfif' },
            { name: 'Fanta', desc: 'Chilled citrus soda to refresh your palate.', price: 900, category: 'BEVERAGES', image: './images/download (23).jfif' },
            { name: 'Coca Cola', desc: 'Classic cola drink, ice cold.', price: 900, category: 'BEVERAGES', image: './images/download (24).jfif' },
            { name: 'Fresh Juice', desc: 'Freshly squeezed orange or pineapple juice.', price: 1800, category: 'BEVERAGES', image: './images/download (25).jfif' },
            { name: 'Mineral Water', desc: 'Sparkling or still mineral water.', price: 800, category: 'BEVERAGES', image: './images/Easy Saucy Ramen Noodles (Vegan Recipe).jfif' },
            { name: 'Coffee', desc: 'Freshly brewed Arabica coffee from Rwandan highlands.', price: 1200, category: 'BEVERAGES', image: './images/america-vibes.jfif' }
        ];
        let editingIndex = -1;

        function loadProducts() {
            const grid = document.getElementById('productsGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (products.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            emptyState.style.display = 'none';
            
            grid.innerHTML = products.map((product, index) => `
                <div class="product-card">
                    <div class="product-header">
                        <div class="product-info">
                            <span class="product-category">${product.category}</span>
                            <h3>${product.name}</h3>
                            <div class="product-price">${product.price.toLocaleString()} RWF</div>
                        </div>
                    </div>
                    <div class="product-description">${product.desc || 'No description available'}</div>
                    <div class="product-actions">
                        <button class="btn-edit" onclick="editProduct(${index})">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="btn-delete" onclick="deleteProduct(${index})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            
            const filteredProducts = products.filter(product => {
                const matchesSearch = product.name.toLowerCase().includes(searchTerm) || 
                                     (product.desc && product.desc.toLowerCase().includes(searchTerm));
                const matchesCategory = !categoryFilter || product.category === categoryFilter;
                return matchesSearch && matchesCategory;
            });
            
            const grid = document.getElementById('productsGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (filteredProducts.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                emptyState.innerHTML = `
                    <i class="fas fa-search"></i>
                    <h3>No products found</h3>
                    <p>Try adjusting your search or filters</p>
                `;
            } else {
                grid.style.display = 'grid';
                emptyState.style.display = 'none';
                
                grid.innerHTML = filteredProducts.map((product, index) => {
                    const originalIndex = products.indexOf(product);
                    return `
                        <div class="product-card">
                            <div class="product-header">
                                <div class="product-info">
                                    <span class="product-category">${product.category}</span>
                                    <h3>${product.name}</h3>
                                    <div class="product-price">${product.price.toLocaleString()} RWF</div>
                                </div>
                            </div>
                            <div class="product-description">${product.desc || 'No description available'}</div>
                            <div class="product-actions">
                                <button class="btn-edit" onclick="editProduct(${originalIndex})">
                                    <i class="fas fa-edit"></i> Edit
                                </button>
                                <button class="btn-delete" onclick="deleteProduct(${originalIndex})">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        function openAddModal() {
            editingIndex = -1;
            document.getElementById('modalTitle').textContent = 'Add New Product';
            document.getElementById('productForm').reset();
            document.getElementById('productModal').classList.add('active');
        }

        function editProduct(index) {
            editingIndex = index;
            const product = products[index];
            
            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.getElementById('productName').value = product.name;
            document.getElementById('productCategory').value = product.category;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productDescription').value = product.desc || '';
            document.getElementById('productImage').value = product.image || '';
            
            document.getElementById('productModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
            document.getElementById('productForm').reset();
            editingIndex = -1;
        }

        function deleteProduct(index) {
            if (confirm('Are you sure you want to delete this product?')) {
                products.splice(index, 1);
                localStorage.setItem('gikundiroMenu', JSON.stringify(products));
                loadProducts();
                
                // Show success message
                const successMsg = document.createElement('div');
                successMsg.style.cssText = `
                    position: fixed;
                    top: 2rem;
                    right: 2rem;
                    background: #4ade80;
                    color: #070707;
                    padding: 1rem 1.5rem;
                    border-radius: 12px;
                    font-weight: 600;
                    z-index: 1000;
                    animation: slideIn 0.3s ease;
                `;
                successMsg.textContent = 'Product deleted successfully!';
                document.body.appendChild(successMsg);
                
                setTimeout(() => {
                    successMsg.remove();
                }, 3000);
            }
        }

        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const productData = {
                name: document.getElementById('productName').value,
                category: document.getElementById('productCategory').value,
                price: parseInt(document.getElementById('productPrice').value),
                desc: document.getElementById('productDescription').value,
                image: document.getElementById('productImage').value || './images/default-product.jpg'
            };
            
            if (editingIndex >= 0) {
                products[editingIndex] = productData;
                successMessage = 'Product updated successfully!';
            } else {
                products.push(productData);
                successMessage = 'Product added successfully!';
            }
            
            localStorage.setItem('gikundiroMenu', JSON.stringify(products));
            loadProducts();
            closeModal();
            
            // Show success message
            const successMsg = document.createElement('div');
            successMsg.style.cssText = `
                position: fixed;
                top: 2rem;
                right: 2rem;
                background: #4ade80;
                color: #070707;
                padding: 1rem 1.5rem;
                border-radius: 12px;
                font-weight: 600;
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            successMsg.textContent = successMessage;
            document.body.appendChild(successMsg);
            
            setTimeout(() => {
                successMsg.remove();
            }, 3000);
        });

        // Close modal when clicking outside
        document.getElementById('productModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Add animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
        `;
        document.head.appendChild(style);

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
        });
    </script>
</body>
</html>
