<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Login | Gikundiro</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-page="customer-login">
  <div class="page-shell">
    <div class="hero-panel">
      <div class="brand-mark">Gikundiro</div>
      <p class="hero-copy">Secure access for customers. Login to manage your reservations and explore VIP services.</p>
    </div>

    <main class="form-frame">
      <div class="card-panel">
        <div class="card-head">
          <span class="card-label">Customer Portal</span>
          <h1>Customer Login</h1>
          <p>Enter your credentials to continue.</p>
        </div>

        <div class="alert-box" id="alert-box"></div>

        <form id="login-form" class="auth-form">
          <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="login-email" placeholder="Email address" required>
          </div>

          <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="button" class="eye-toggle" data-target="login-password"><i class="fa-solid fa-eye"></i></button>
          </div>

          <div class="form-row between">
            <label class="checkbox-label"><input type="checkbox" id="remember-me"><span>Remember me</span></label>
            <a href="customer-signup.html" class="text-link">Create account</a>
          </div>

          <button type="submit" class="btn-primary" id="login-button"><span>Login</span><span class="spinner"></span></button>
        </form>

        <div class="footer-line">
          <span>Or access the</span>
          <a href="admin-login.html">Admin login</a>
        </div>
      </div>
    </main>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
