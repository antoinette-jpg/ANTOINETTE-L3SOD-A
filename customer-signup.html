<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Signup | Gikundiro</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-page="customer-signup">
  <div class="page-shell">
    <div class="hero-panel">
      <div class="brand-mark">Gikundiro</div>
      <p class="hero-copy">Create a customer account to book VIP rooms and manage your lounge experience.</p>
    </div>

    <main class="form-frame">
      <div class="card-panel">
        <div class="card-head">
          <span class="card-label">Customer Portal</span>
          <h1>Customer Signup</h1>
          <p>Register with your details and access the customer dashboard.</p>
        </div>

        <div class="alert-box" id="alert-box"></div>

        <form id="signup-form" class="auth-form">
          <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="signup-name" placeholder="Full name" required>
          </div>

          <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="signup-email" placeholder="Email address" required>
          </div>

          <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="signup-password" placeholder="Password" required>
            <button type="button" class="eye-toggle" data-target="signup-password"><i class="fa-solid fa-eye"></i></button>
          </div>

          <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="signup-confirm" placeholder="Confirm password" required>
            <button type="button" class="eye-toggle" data-target="signup-confirm"><i class="fa-solid fa-eye"></i></button>
          </div>

          <button type="submit" class="btn-primary" id="signup-button"><span>Sign Up</span><span class="spinner"></span></button>
        </form>

        <div class="footer-line">
          <span>Already have an account?</span>
          <a href="customer-login.html">Customer login</a>
        </div>
      </div>
    </main>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
