<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Management | Gikundiro Admin</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .menu-management { padding: 2rem; }
    .menu-table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
    .menu-table th, .menu-table td { padding: 1rem; text-align: left; border-bottom: 1px solid #ddd; }
    .menu-table th { background-color: #f5f5f5; }
    .menu-image { width: 80px; height: 60px; object-fit: cover; border-radius: 4px; }
    .edit-btn { background: #007bff; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
    .edit-btn:hover { background: #0056b3; }
    .edit-form { display: none; background: #f9f9f9; padding: 1rem; margin-top: 1rem; border-radius: 8px; }
    .edit-form input, .edit-form select { width: 100%; padding: 0.5rem; margin-bottom: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
    .edit-form button { margin-right: 0.5rem; }
    .save-btn { background: #28a745; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
    .cancel-btn { background: #6c757d; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body data-page="admin-menu">
  <header class="dash-header">
    <div class="brand-mark">Gikundiro</div>
    <nav>
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="admin-menu.html" class="active">Menu Management</a>
    </nav>
    <button id="logout-btn" class="btn-ghost"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
  </header>

  <main class="dashboard-layout">
    <section class="dash-panel">
      <div class="dash-title">
        <span>Menu Management</span>
        <h1>Edit Menu Items</h1>
      </div>
      <p>View and edit all menu items including names, prices, and images.</p>
      <button id="add-item-btn" class="edit-btn" style="margin-bottom: 1rem;">Add New Item</button>

      <div class="menu-management">
        <table class="menu-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Description</th>
              <th>Price (RWF)</th>
              <th>Category</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="menu-table-body">
            <!-- Menu items will be populated here -->
          </tbody>
        </table>

        <!-- Add New Item Form -->
        <div id="add-form" class="edit-form" style="display: none;">
          <h3>Add New Menu Item</h3>
          <input type="text" id="new-name" placeholder="Name">
          <input type="text" id="new-desc" placeholder="Description">
          <input type="number" id="new-price" placeholder="Price">
          <select id="new-category">
            <option value="FOODS">FOODS</option>
            <option value="DRINKS">DRINKS</option>
            <option value="BEVERAGES">BEVERAGES</option>
          </select>
          <input type="text" id="new-image" placeholder="Image path">
          <button class="save-btn" onclick="addItem()">Add Item</button>
          <button class="cancel-btn" onclick="hideAddForm()">Cancel</button>
        </div>
      </div>
    </section>
  </main>

  <script src="js/script.js"></script>
  <script>
    // Load menu data
    let menuData = JSON.parse(localStorage.getItem('gikundiroMenu')) || [
      { name: 'Grilled Chicken', desc: 'Tender chicken marinated in herbs and grilled over open flame.', price: 18200, category: 'FOODS', image: './images/JUNGLE GRILL.jfif' },
      { name: 'Beef Brochettes', desc: 'Skewered beef cubes marinated in African spices, grilled to perfection.', price: 13000, category: 'FOODS', image: './images/"The JUICIEST BBQ Kebabs Ever! 🤤🔥 _ Perfect Grill Shots!".jfif' },
      { name: 'Goat Brochettes', desc: 'Tender goat skewers with peppers — a local Rwandan favorite.', price: 14300, category: 'FOODS', image: './images/"The JUICIEST BBQ Kebabs Ever! 🤤🔥 _ Perfect Grill Shots!".jfif' },
      { name: 'Fish Fillet', desc: 'Fresh Nile perch fillet grilled with lemon and herbs.', price: 21500, category: 'FOODS', image: './images/Easy Saucy Ramen Noodles (Vegan Recipe).jfif' },
      { name: 'Ugali & Sukuma Wiki', desc: 'Traditional maize meal with sautéed collard greens.', price: 8500, category: 'FOODS', image: './images/america-vibes.jfif' },
      { name: 'Chicken Wings', desc: 'Crispy fried wings with spicy buffalo sauce.', price: 12500, category: 'FOODS', image: './images/download (20).jfif' },
      { name: 'French Fries', desc: 'Golden crispy fries with sea salt.', price: 6500, category: 'FOODS', image: './images/download (22).jfif' },
      { name: 'Caesar Salad', desc: 'Fresh romaine lettuce with parmesan and croutons.', price: 9500, category: 'FOODS', image: './images/download (23).jfif' },
      { name: 'Gold Cocktail', desc: 'Signature drink with citrus notes and premium spirits.', price: 3200, category: 'DRINKS', image: './images/download (12).jfif' },
      { name: 'Red Wine', desc: 'Fine selection of red wine from renowned vineyards.', price: 3800, category: 'DRINKS', image: './images/download (13).jfif' },
      { name: 'White Wine', desc: 'Chilled white wine with crisp, fruity notes.', price: 4200, category: 'DRINKS', image: './images/download (14).jfif' },
      { name: 'Beer (Local)', desc: 'Premium Rwandan beer, cold and refreshing.', price: 2500, category: 'DRINKS', image: './images/download (24).jfif' },
      { name: 'Imported Beer', desc: 'International beer selection from around the world.', price: 3500, category: 'DRINKS', image: './images/download (25).jfif' },
      { name: 'Mojito', desc: 'Classic Cuban cocktail with mint, lime, and rum.', price: 4500, category: 'DRINKS', image: './images/download (20).jfif' },
      { name: 'Margarita', desc: 'Tequila-based cocktail with lime and triple sec.', price: 4800, category: 'DRINKS', image: './images/download (22).jfif' },
      { name: 'Fanta', desc: 'Chilled citrus soda to refresh your palate.', price: 900, category: 'BEVERAGES', image: './images/download (23).jfif' },
      { name: 'Coca Cola', desc: 'Classic cola drink, ice cold.', price: 900, category: 'BEVERAGES', image: './images/download (24).jfif' },
      { name: 'Fresh Juice', desc: 'Freshly squeezed orange or pineapple juice.', price: 1800, category: 'BEVERAGES', image: './images/download (25).jfif' },
      { name: 'Mineral Water', desc: 'Sparkling or still mineral water.', price: 800, category: 'BEVERAGES', image: './images/Easy Saucy Ramen Noodles (Vegan Recipe).jfif' },
      { name: 'Coffee', desc: 'Freshly brewed Arabica coffee from Rwandan highlands.', price: 1200, category: 'BEVERAGES', image: './images/america-vibes.jfif' }
    ];

    const menuTableBody = document.getElementById('menu-table-body');

    function renderMenuTable() {
      menuTableBody.innerHTML = '';
      menuData.forEach((item, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><img src="${item.image}" alt="${item.name}" class="menu-image"></td>
          <td>${item.name}</td>
          <td>${item.desc}</td>
          <td>${item.price}</td>
          <td>${item.category}</td>
          <td>
            <button class="edit-btn" onclick="editItem(${index})">Edit</button>
            <button class="cancel-btn" onclick="deleteItem(${index})" style="margin-left: 0.5rem;">Delete</button>
          </td>
        `;
        menuTableBody.appendChild(row);
      });
    }

    function editItem(index) {
      const item = menuData[index];
      const row = menuTableBody.children[index];
      const cells = row.children;

      // Hide the row content and show edit form
      for (let cell of cells) {
        cell.style.display = 'none';
      }

      const editForm = document.createElement('td');
      editForm.colSpan = 6;
      editForm.innerHTML = `
        <div class="edit-form">
          <input type="text" id="edit-name-${index}" value="${item.name}" placeholder="Name">
          <input type="text" id="edit-desc-${index}" value="${item.desc}" placeholder="Description">
          <input type="number" id="edit-price-${index}" value="${item.price}" placeholder="Price">
          <select id="edit-category-${index}">
            <option value="FOODS" ${item.category === 'FOODS' ? 'selected' : ''}>FOODS</option>
            <option value="DRINKS" ${item.category === 'DRINKS' ? 'selected' : ''}>DRINKS</option>
            <option value="BEVERAGES" ${item.category === 'BEVERAGES' ? 'selected' : ''}>BEVERAGES</option>
          </select>
          <input type="text" id="edit-image-${index}" value="${item.image}" placeholder="Image path">
          <button class="save-btn" onclick="saveItem(${index})">Save</button>
          <button class="cancel-btn" onclick="cancelEdit(${index})">Cancel</button>
        </div>
      `;
      row.appendChild(editForm);
      editForm.style.display = 'block';
    }

    function saveItem(index) {
      const name = document.getElementById(`edit-name-${index}`).value;
      const desc = document.getElementById(`edit-desc-${index}`).value;
      const price = parseInt(document.getElementById(`edit-price-${index}`).value);
      const category = document.getElementById(`edit-category-${index}`).value;
      const image = document.getElementById(`edit-image-${index}`).value;

      menuData[index] = { name, desc, price, category, image };
      localStorage.setItem('gikundiroMenu', JSON.stringify(menuData));
      renderMenuTable();
    }

    function cancelEdit(index) {
      renderMenuTable();
    }

    function deleteItem(index) {
      if (confirm('Are you sure you want to delete this item?')) {
        menuData.splice(index, 1);
        localStorage.setItem('gikundiroMenu', JSON.stringify(menuData));
        renderMenuTable();
      }
    }

    function addItem() {
      const name = document.getElementById('new-name').value;
      const desc = document.getElementById('new-desc').value;
      const price = parseInt(document.getElementById('new-price').value);
      const category = document.getElementById('new-category').value;
      const image = document.getElementById('new-image').value;

      if (name && desc && price && image) {
        menuData.push({ name, desc, price, category, image });
        localStorage.setItem('gikundiroMenu', JSON.stringify(menuData));
        renderMenuTable();
        hideAddForm();
      } else {
        alert('Please fill in all fields.');
      }
    }

    function showAddForm() {
      document.getElementById('add-form').style.display = 'block';
    }

    function hideAddForm() {
      document.getElementById('add-form').style.display = 'none';
      // Clear form
      document.getElementById('new-name').value = '';
      document.getElementById('new-desc').value = '';
      document.getElementById('new-price').value = '';
      document.getElementById('new-image').value = '';
    }

    // Initial render
    renderMenuTable();

    // Add event listener for add button
    document.getElementById('add-item-btn').addEventListener('click', showAddForm);

    // Logout functionality
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('gikundiroCurrent');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
